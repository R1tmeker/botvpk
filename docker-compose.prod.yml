services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpk_zvezda}
      POSTGRES_USER: ${POSTGRES_USER:-vpk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  backend:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX is required}/backend:${RELEASE_VERSION:?RELEASE_VERSION is required}
    env_file:
      - ${APP_SHARED_DIR:-/opt/botvpk/shared}/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readiness', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  bot:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX is required}/backend:${RELEASE_VERSION:?RELEASE_VERSION is required}
    env_file:
      - ${APP_SHARED_DIR:-/opt/botvpk/shared}/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: python -m app.bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -m app.scripts.check_heartbeat $${BOT_HEARTBEAT_PATH:-/tmp/botvpk-bot.heartbeat} 60"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  vk_bot:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX is required}/backend:${RELEASE_VERSION:?RELEASE_VERSION is required}
    env_file:
      - ${APP_SHARED_DIR:-/opt/botvpk/shared}/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: python -m app.vk_bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -m app.scripts.check_heartbeat $${VK_BOT_HEARTBEAT_PATH:-/tmp/botvpk-vk-bot.heartbeat} 60"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX is required}/frontend:${RELEASE_VERSION:?RELEASE_VERSION is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/version.json | grep -q build_id"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${APP_SHARED_DIR:-/opt/botvpk/shared}/maintenance:/var/www/maintenance:ro
    ports:
      - "127.0.0.1:8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  clamav_data:
  uploads_data:
