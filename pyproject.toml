[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = ["frontend/node_modules", "frontend/dist", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B008", "UP017", "I001"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["backend"]
testpaths = ["backend/tests"]
