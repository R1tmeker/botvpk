server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS — resolves at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 200m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; connect-src 'self' https://api.telegram.org https://*.trycloudflare.com; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;

    location /api/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        set $backend backend:8000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /health {
        set $backend backend:8000;
        proxy_pass http://$backend;
    }

    location /uploads/ {
        add_header Cache-Control "public, max-age=86400" always;
        set $backend backend:8000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|webp|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        set $frontend frontend:80;
        proxy_pass http://$frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        set $frontend frontend:80;
        proxy_pass http://$frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}
