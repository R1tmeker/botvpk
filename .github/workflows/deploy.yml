name: CI and production release

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vpk_zvezda
          POSTGRES_USER: vpk
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vpk -d vpk_zvezda"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      BOT_TOKEN: test:test
      DATABASE_URL: postgresql+asyncpg://vpk:test_password@localhost:5432/vpk_zvezda
      SESSION_SECRET: test_session_secret_that_is_long_enough
      TOTP_ENCRYPTION_KEY: test_totp_encryption_key_that_is_long_enough
      LINK_CODE_PEPPER: test_link_code_pepper_that_is_long_enough
      POSTGRES_PASSWORD: test_password
      REDIS_URL: redis://localhost:6379/0
      DRYRUN: "true"
      RUN_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt pip-audit
      - name: Ruff
        run: ruff check backend/app backend/tests
      - name: Test migrations from clean and current production schema
        working-directory: backend
        run: |
          alembic -c alembic.ini upgrade head
          alembic -c alembic.ini downgrade 0011_perf_pagination_indexes
          alembic -c alembic.ini upgrade head
      - name: Pytest
        run: >-
          pytest
          --cov=app.services.auth_security
          --cov=app.services.attendance
          --cov=app.services.uploads
          --cov=app.services.totp_secrets
          --cov-report=term-missing
          --cov-fail-under=90
      - name: Python dependency audit
        run: pip-audit -r backend/requirements.txt
      - name: Alembic has one head
        working-directory: backend
        run: test "$(alembic -c alembic.ini heads | wc -l)" -eq 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend e2e smoke
        working-directory: frontend
        run: npm run test:e2e
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate production Compose
        run: |
          cp .env.example .env
          IMAGE_PREFIX=ghcr.io/example/botvpk RELEASE_VERSION=test APP_SHARED_DIR="$PWD" \
            docker compose --project-name botvpk --env-file .env -f docker-compose.prod.yml config >/dev/null
          rm .env

  build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.image.outputs.prefix }}
    steps:
      - uses: actions/checkout@v4
      - id: image
        name: Resolve lowercase image prefix
        shell: bash
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image.outputs.prefix }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: BUILD_ID=${{ github.sha }}
          tags: ${{ steps.image.outputs.prefix }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.prefix }}/backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.prefix }}/frontend:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH with pinned host keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          printf '%s\n' "$SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
      - name: Create immutable release directory
        run: >-
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          "mkdir -p '${{ secrets.DEPLOY_PATH }}/releases/${{ github.sha }}'"
      - name: Upload release manifests
        run: |
          rsync -azR \
            ./docker-compose.prod.yml \
            ./deploy.sh \
            ./bootstrap-server.sh \
            ./nginx/nginx.prod.conf \
            ./scripts/release-smoke.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/releases/${{ github.sha }}/
      - name: Deploy release with backup and rollback
        env:
          IMAGE_PREFIX: ${{ needs.build.outputs.image_prefix }}
        run: >-
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          "chmod +x '${{ secrets.DEPLOY_PATH }}/releases/${{ github.sha }}/deploy.sh'
          '${{ secrets.DEPLOY_PATH }}/releases/${{ github.sha }}/scripts/release-smoke.sh' &&
          cd '${{ secrets.DEPLOY_PATH }}/releases/${{ github.sha }}' &&
          APP_ROOT='${{ secrets.DEPLOY_PATH }}' IMAGE_PREFIX='$IMAGE_PREFIX'
          bash ./deploy.sh '${{ github.sha }}'"
