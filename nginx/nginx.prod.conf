upstream botvpk_backend {
    server backend:8000;
    keepalive 16;
}

upstream botvpk_frontend {
    server frontend:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 20m;

    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.telegram.org; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    error_page 503 /maintenance.html;

    location = /maintenance.html {
        alias /var/www/maintenance/index.html;
        internal;
        add_header Cache-Control "no-store" always;
    }

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /health {
        proxy_pass http://botvpk_backend;
    }

    location = /readiness {
        proxy_pass http://botvpk_backend;
    }

    location = /version.json {
        proxy_pass http://botvpk_frontend/version.json;
        add_header Cache-Control "no-store" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_pass http://botvpk_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/ {
        if (-f /var/www/maintenance/enabled) { return 503; }
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_pass http://botvpk_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_read_timeout 70s;
    }

    location /uploads/ {
        if (-f /var/www/maintenance/enabled) { return 503; }
        add_header Cache-Control "private, max-age=3600" always;
        proxy_pass http://botvpk_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|webp|svg|ico)$ {
        if (-f /var/www/maintenance/enabled) { return 503; }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_pass http://botvpk_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        if (-f /var/www/maintenance/enabled) { return 503; }
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
        proxy_pass http://botvpk_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
